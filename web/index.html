<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude Code Trainer — Opus 4.8</title>
<link rel="stylesheet" href="styles.css?v=2" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <div class="logo">CC</div>
      <div>
        <div class="brand-title">Claude Code Trainer</div>
        <div class="brand-sub" id="brandSub">Opus 4.8 · advanced techniques</div>
      </div>
    </div>

    <div class="progress-summary">
      <div class="bar"><div id="progressBar" class="bar-fill"></div></div>
      <div class="bar-label"><span id="progressText">0 / 15 chapters</span></div>
    </div>

    <nav id="chapterNav"></nav>

    <div class="sidebar-foot">
      <button id="resetBtn" class="ghost">Сбросить прогресс</button>
      <a id="cheatBtn" class="ghost" href="#cheatsheets">Справочники</a>
    </div>
  </aside>

  <main id="main">
    <header id="topbar">
      <div id="crumbs">Главная</div>
      <div class="topbar-right">
      <button id="langBtn" class="ghost" title="Switch language">RU</button>
      <button id="themeBtn" class="ghost" title="Toggle theme">◐</button>
      </div>
    </header>

    <article id="content"><!-- rendered --></article>

    <footer id="chapterNav-foot">
      <button id="prevBtn" class="ghost">← Назад</button>
      <button id="markDoneBtn" class="primary">Отметить пройденной</button>
      <button id="nextBtn" class="primary">Далее →</button>
    </footer>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="content.js?v=19"></script>
<script src="app.js?v=6"></script>
</body>
</html>
