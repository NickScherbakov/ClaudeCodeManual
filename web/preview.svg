<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Top badge: CC -->
  <rect x="60" y="60" width="56" height="56" rx="14" fill="url(#accent)"/>
  <text x="88" y="99" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="22" font-weight="700" fill="#ffffff">CC</text>

  <!-- Course label -->
  <text x="132" y="84" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#8b949e" letter-spacing="2">CLAUDE CODE</text>
  <text x="132" y="106" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#8b949e" letter-spacing="2">OPUS 4.8 · ПРОДВИНУТЫЕ ТЕХНИКИ</text>

  <!-- Main headline -->
  <text x="60" y="220" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="54" font-weight="700" fill="#e6edf3">Многоагентная</text>
  <text x="60" y="286" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="54" font-weight="700" fill="#e6edf3">оркестрация</text>
  <text x="60" y="352" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="54" font-weight="700" fill="url(#accent)">в Claude Code</text>

  <!-- Tagline -->
  <text x="60" y="412" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#8b949e">Один промпт не справится с аудитом 300 файлов.</text>
  <text x="60" y="440" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#8b949e">Workflow tool справится — и этот курс покажет как.</text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="60" y="490" width="180" height="76" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="150" y="526" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="url(#accent)">15</text>
  <text x="150" y="551" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#8b949e">интерактивных глав</text>

  <!-- Stat 2 -->
  <rect x="256" y="490" width="180" height="76" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="346" y="526" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="url(#accent)">14</text>
  <text x="346" y="551" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#8b949e">практических лаба</text>

  <!-- Stat 3 -->
  <rect x="452" y="490" width="180" height="76" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="542" y="526" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="url(#gold)">CC0</text>
  <text x="542" y="551" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#8b949e">бесплатно навсегда</text>

  <!-- Right side: code block -->
  <rect x="680" y="140" width="460" height="370" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Code block header -->
  <rect x="680" y="140" width="460" height="36" rx="12" fill="#21262d"/>
  <rect x="680" y="158" width="460" height="18" fill="#21262d"/>
  <circle cx="706" cy="158" r="6" fill="#ff5f57"/>
  <circle cx="726" cy="158" r="6" fill="#febc2e"/>
  <circle cx="746" cy="158" r="6" fill="#28c840"/>
  <text x="790" y="163" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e">quick-demo.js</text>

  <!-- Code lines -->
  <text x="700" y="210" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7c6af7">phase</text>
  <text x="740" y="210" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#e6edf3">(</text>
  <text x="748" y="210" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#a5d6ff">'Find'</text>
  <text x="790" y="210" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#e6edf3">)</text>

  <text x="700" y="234" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#ff7b72">const</text>
  <text x="740" y="234" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#e6edf3"> results = </text>
  <text x="835" y="234" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#ff7b72">await</text>

  <text x="700" y="258" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7c6af7">  parallel</text>
  <text x="763" y="258" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#e6edf3">([finder1,</text>

  <text x="700" y="282" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#e6edf3">    finder2, finder3])</text>

  <line x1="700" y1="300" x2="1120" y2="300" stroke="#30363d" stroke-width="1"/>

  <text x="700" y="326" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7c6af7">phase</text>
  <text x="740" y="326" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#e6edf3">(</text>
  <text x="748" y="326" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#a5d6ff">'Verify'</text>
  <text x="800" y="326" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#e6edf3">)</text>

  <text x="700" y="350" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#ff7b72">await</text>
  <text x="742" y="350" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7c6af7"> pipeline</text>
  <text x="809" y="350" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#e6edf3">(</text>

  <text x="700" y="374" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#e6edf3">  findings,</text>
  <text x="700" y="398" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#79c0ff">  skepticAgent</text>
  <text x="820" y="398" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#8b949e">  // refuted=true</text>
  <text x="700" y="422" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#e6edf3">  filterSurvivors</text>
  <text x="820" y="422" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#e6edf3">)</text>

  <!-- Bottom URL bar -->
  <rect x="60" y="582" width="560" height="32" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="603" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#8b949e">🌐 </text>
  <text x="104" y="603" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#7c6af7">nickscherbakov.github.io/ClaudeCodeManual</text>

  <!-- Star badge -->
  <rect x="680" y="532" width="460" height="50" rx="10" fill="#f59e0b22" stroke="#f59e0b55" stroke-width="1"/>
  <text x="910" y="563" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#f6a61a">⭐  github.com/NickScherbakov/ClaudeCodeManual</text>
</svg>
